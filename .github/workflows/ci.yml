name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint (+ typecheck/test when core is reachable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lint needs no core import — always runs.
      - name: Lint
        run: |
          python -m pip install --upgrade pip ruff
          ruff check src tests

      # typecheck + test need the core (tulip-agents). It isn't on PyPI yet and
      # the core repo is private, so this gracefully no-ops until the core is
      # reachable — set CORE_PIP (e.g. a PyPI release, or a tokenised git URL in
      # the CORE_PIP secret) to enable the full gate.
      - name: Typecheck + test (when core is reachable)
        env:
          CORE_PIP: ${{ secrets.CORE_PIP || 'tulip-agents @ git+https://github.com/tuliplabs-ai/sdk-python.git@main' }}
        run: |
          if ! pip install "$CORE_PIP" 2>/dev/null; then
            echo "::notice::core (tulip-agents) not reachable — skipping typecheck+test. "\
                 "Publish to PyPI or set the CORE_PIP secret to enable the full gate."
            exit 0
          fi
          pip install -e . --no-deps
          pip install pytest pytest-asyncio mypy
          mypy src/tulip_integrations
          pytest tests -q
