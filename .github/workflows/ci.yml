name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # tulip-agents (the core) isn't on PyPI yet, so install it from the
      # sibling repo's main, then install this package without re-resolving deps.
      - name: Install core (from git) + integrations
        run: |
          python -m pip install --upgrade pip
          pip install "tulip-agents @ git+https://github.com/tuliplabs-ai/sdk-python.git@main"
          pip install -e . --no-deps
          pip install pytest pytest-asyncio ruff mypy

      - name: Lint
        run: ruff check src tests

      - name: Typecheck
        run: mypy src/tulip_integrations

      - name: Test
        run: pytest tests -q
